spring.application.name=pet-adoption-system

spring.messages.basename=messages
spring.web.locale=es
spring.web.locale-resolver=fixed

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pet_adoption}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

app.security.jwt.secret=${JWT_SECRET:dev-only-change-me-use-at-least-256-bits-for-hs256-please-change-in-prod}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

app.cors.allowed-origins[0]=${CORS_ORIGIN_1:http://localhost:8080}
app.cors.allowed-origins[1]=${CORS_ORIGIN_2:http://localhost:5173}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
