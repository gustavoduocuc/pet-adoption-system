services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: pet_adoption
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      # Usuario de la app (evitar "root"; menor privilegio frente a usar root en JDBC).
      MYSQL_USER: ${MYSQL_APP_USER:-petapp}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-petapp_change_me}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build: .
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    sysctls:
      # Mitiga hallazgos tipo "TCP Timestamps Information Disclosure" en informes OpenVAS (NVT 80091).
      # En Docker Desktop algunos entornos ignoran sysctls de red; ver docs/security/greenbone-openvas.md.
      - net.ipv4.tcp_timestamps=0
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-jdbc:mysql://mysql:3306/pet_adoption}
      DATABASE_USERNAME: ${MYSQL_APP_USER:-petapp}
      DATABASE_PASSWORD: ${MYSQL_APP_PASSWORD:-petapp_change_me}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-use-at-least-256-bits-for-hs256-please-change-in-prod}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      CORS_ORIGIN_1: ${CORS_ORIGIN_1:-http://localhost:8080}
      CORS_ORIGIN_2: ${CORS_ORIGIN_2:-http://localhost:5173}

  proxy:
    profiles:
      - https
    image: httpd:2.4
    ports:
      - "${HTTP_REDIRECT_HOST_PORT:-80}:80"
      - "${HTTPS_HOST_PORT:-443}:443"
    volumes:
      - ./docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./docker/apache/extra/httpd-redirect-https.conf:/usr/local/apache2/conf/extra/httpd-redirect-https.conf:ro
      - ./docker/apache/extra/httpd-ssl.conf:/usr/local/apache2/conf/extra/httpd-ssl.conf:ro
      - ./docker/apache/certs/server.crt:/usr/local/apache2/conf/server.crt:ro
      - ./docker/apache/certs/server.key:/usr/local/apache2/conf/server.key:ro
    depends_on:
      app:
        condition: service_started

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    ports:
      - "${JENKINS_UI_HOST_PORT:-9090}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/workspace
    networks:
      - app_net

  sonar_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${SONAR_POSTGRES_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonar}
      POSTGRES_DB: ${SONAR_POSTGRES_DB:-sonar}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  sonarqube:
    image: sonarqube:lts-community
    depends_on:
      sonar_db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/${SONAR_POSTGRES_DB:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_POSTGRES_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonar}
    ports:
      - "${SONAR_HOST_PORT:-9000}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - app_net

  # Greenbone Community Edition (OpenVAS / GSA). Optional: --profile greenbone
  vulnerability-tests:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/vulnerability-tests
    environment:
      FEED_RELEASE: "${GREENBONE_FEED_RELEASE:-24.10}"
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    volumes:
      - vt_data_vol:/mnt
    networks:
      - greenbone_net
    restart: unless-stopped

  notus-data:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/notus-data
    environment:
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    volumes:
      - notus_data_vol:/mnt
    networks:
      - greenbone_net
    restart: unless-stopped

  scap-data:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/scap-data
    environment:
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    volumes:
      - scap_data_vol:/mnt
    networks:
      - greenbone_net
    restart: unless-stopped

  cert-bund-data:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/cert-bund-data
    environment:
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    volumes:
      - cert_data_vol:/mnt
    networks:
      - greenbone_net
    restart: unless-stopped

  dfn-cert-data:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/dfn-cert-data
    environment:
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    volumes:
      - cert_data_vol:/mnt
    depends_on:
      cert-bund-data:
        condition: service_healthy
    networks:
      - greenbone_net
    restart: unless-stopped

  data-objects:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/data-objects
    environment:
      FEED_RELEASE: "${GREENBONE_FEED_RELEASE:-24.10}"
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    volumes:
      - data_objects_vol:/mnt
    networks:
      - greenbone_net
    restart: unless-stopped

  report-formats:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/report-formats
    environment:
      FEED_RELEASE: "${GREENBONE_FEED_RELEASE:-24.10}"
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    volumes:
      - data_objects_vol:/mnt
    depends_on:
      data-objects:
        condition: service_healthy
    networks:
      - greenbone_net
    restart: unless-stopped

  gpg-data:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/gpg-data
    volumes:
      - gpg_data_vol:/mnt
    networks:
      - greenbone_net
    restart: "no"

  redis-server:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/redis-server
    restart: unless-stopped
    volumes:
      - redis_socket_vol:/run/redis/
    networks:
      - greenbone_net

  pg-gvm-migrator:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/pg-gvm-migrator:stable
    restart: "no"
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql
    networks:
      - greenbone_net

  pg-gvm:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/pg-gvm:stable
    restart: unless-stopped
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql
    depends_on:
      pg-gvm-migrator:
        condition: service_completed_successfully
    networks:
      - greenbone_net

  gvmd:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/gvmd:stable
    restart: unless-stopped
    volumes:
      - gvmd_data_vol:/var/lib/gvm
      - scap_data_vol:/var/lib/gvm/scap-data/
      - cert_data_vol:/var/lib/gvm/cert-data
      - data_objects_vol:/var/lib/gvm/data-objects/gvmd
      - vt_data_vol:/var/lib/openvas/plugins
      - psql_data_vol:/var/lib/postgresql
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
      - psql_socket_vol:/var/run/postgresql
    depends_on:
      pg-gvm:
        condition: service_started
      scap-data:
        condition: service_healthy
      cert-bund-data:
        condition: service_healthy
      dfn-cert-data:
        condition: service_healthy
      data-objects:
        condition: service_healthy
      report-formats:
        condition: service_healthy
    networks:
      - greenbone_net

  gsa:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/gsa:stable-slim
    environment:
      MOUNT_PATH: "/mnt/web"
      KEEP_ALIVE: "${GREENBONE_KEEP_ALIVE:-1}"
    healthcheck:
      test: ["CMD-SHELL", "test -e /run/gsa/copying.done"]
      start_period: 5s
    volumes:
      - gsa_data_vol:/mnt/web
    networks:
      - greenbone_net
    restart: unless-stopped

  gsad:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/gsad:stable
    restart: unless-stopped
    environment:
      GSAD_HTTP_ONLY: "true"
      GSAD_API_ONLY: "true"
      GSAD_FOREGROUND: "true"
    volumes:
      - gvmd_socket_vol:/run/gvmd
    depends_on:
      gvmd:
        condition: service_started
    networks:
      - greenbone_net

  gvm-config:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/gvm-config:latest
    environment:
      ENABLE_NGINX_CONFIG: "true"
      ENABLE_TLS_GENERATION: "true"
    volumes:
      - nginx_config_vol:/mnt/nginx/configs
      - nginx_certificates_vol:/mnt/nginx/certs
    networks:
      - greenbone_net
    restart: "no"

  nginx:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/nginx:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GREENBONE_NGINX_HTTPS_PORT:-8443}:443"
      - "127.0.0.1:${GREENBONE_NGINX_GSA_PORT:-9392}:9392"
    volumes:
      - nginx_config_vol:/etc/nginx/conf.d:ro
      - nginx_certificates_vol:/etc/nginx/certs:ro
      - gsa_data_vol:/usr/share/nginx/html:ro
    depends_on:
      gvm-config:
        condition: service_completed_successfully
      gsa:
        condition: service_healthy
      gsad:
        condition: service_started
    networks:
      - greenbone_net

  configure-openvas:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/openvas-scanner:stable
    volumes:
      - openvas_data_vol:/mnt
      - openvas_log_data_vol:/var/log/openvas
    command:
      - /bin/sh
      - -c
      - |
        printf "table_driven_lsc = yes\nopenvasd_server = http://openvasd:80\n" > /mnt/openvas.conf
        sed "s/127/128/" /etc/openvas/openvas_log.conf | sed 's/gvm/openvas/' > /mnt/openvas_log.conf
        chmod 644 /mnt/openvas.conf
        chmod 644 /mnt/openvas_log.conf
        touch /var/log/openvas/openvas.log
        chmod 666 /var/log/openvas/openvas.log
    networks:
      - greenbone_net
    restart: "no"

  openvas:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/openvas-scanner:stable
    restart: unless-stopped
    volumes:
      - openvas_data_vol:/etc/openvas
      - openvas_log_data_vol:/var/log/openvas
    command:
      - /bin/sh
      - -c
      - |
        cat /etc/openvas/openvas.conf
        tail -f /var/log/openvas/openvas.log
    depends_on:
      configure-openvas:
        condition: service_completed_successfully
    networks:
      - greenbone_net

  openvasd:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/openvas-scanner:stable
    restart: unless-stopped
    environment:
      OPENVASD_MODE: service_notus
      GNUPGHOME: /etc/openvas/gnupg
      LISTENING: 0.0.0.0:80
    volumes:
      - openvas_data_vol:/etc/openvas
      - openvas_log_data_vol:/var/log/openvas
      - gpg_data_vol:/etc/openvas/gnupg
      - notus_data_vol:/var/lib/notus
    depends_on:
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy
      configure-openvas:
        condition: service_completed_successfully
      gpg-data:
        condition: service_completed_successfully
    networks:
      greenbone_net:
        aliases:
          - openvasd

  ospd-openvas:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/ospd-openvas:stable
    restart: unless-stopped
    hostname: ospd-openvas.local
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    command:
      [
        "ospd-openvas",
        "-f",
        "--config",
        "/etc/gvm/ospd-openvas.conf",
        "--notus-feed-dir",
        "/var/lib/notus/advisories",
        "-m",
        "666",
      ]
    volumes:
      - gpg_data_vol:/etc/openvas/gnupg
      - vt_data_vol:/var/lib/openvas/plugins
      - notus_data_vol:/var/lib/notus
      - ospd_openvas_socket_vol:/run/ospd
      - redis_socket_vol:/run/redis/
      - openvas_data_vol:/etc/openvas/
      - openvas_log_data_vol:/var/log/openvas
    depends_on:
      redis-server:
        condition: service_started
      gpg-data:
        condition: service_completed_successfully
      configure-openvas:
        condition: service_completed_successfully
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy
    # Misma red que mysql/app para poder alcanzar IPs del stack (p. ej. 172.23.0.3).
    # Sin esto, greenbone_net está aislada y el escaneo termina en 0 hosts.
    networks:
      - greenbone_net
      - default

  gvm-tools:
    profiles:
      - greenbone
    pull_policy: missing
    image: ${GREENBONE_IMAGE_PREFIX:-registry.community.greenbone.net/community}/gvm-tools
    volumes:
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
    depends_on:
      gvmd:
        condition: service_started
      ospd-openvas:
        condition: service_started
    networks:
      - greenbone_net
    restart: "no"

volumes:
  mysql_data:
  jenkins_home:
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
  gpg_data_vol:
  scap_data_vol:
  cert_data_vol:
  data_objects_vol:
  gvmd_data_vol:
  psql_data_vol:
  vt_data_vol:
  notus_data_vol:
  psql_socket_vol:
  gvmd_socket_vol:
  ospd_openvas_socket_vol:
  redis_socket_vol:
  openvas_data_vol:
  openvas_log_data_vol:
  gsa_data_vol:
  nginx_config_vol:
  nginx_certificates_vol:

networks:
  app_net:
    driver: bridge
  greenbone_net:
    driver: bridge
