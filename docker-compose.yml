services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: pet_adoption
      MYSQL_USER: ${DATABASE_USERNAME:-petuser}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-petpassword}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build: .
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:mysql://mysql:3306/pet_adoption}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-petuser}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-petpassword}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-use-at-least-256-bits-for-hs256-please-change-in-prod}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      CORS_ORIGIN_1: ${CORS_ORIGIN_1:-http://localhost:8080}
      CORS_ORIGIN_2: ${CORS_ORIGIN_2:-http://localhost:5173}

volumes:
  mysql_data:
